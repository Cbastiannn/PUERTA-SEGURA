[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
startCommand = "python manage.py migrate && python manage.py init_data 2>/dev/null; daphne -b 0.0.0.0 -p $PORT config.asgi:application"
healthcheckPath = "/api/stats/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
